<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - BlueCollar Bookie</title>
    <meta name="description" content="Sign in to your BlueCollar Bookie account">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <span class="logo-icon">&#9881;</span>
                <span class="logo-text">BlueCollar <span class="highlight">Bookie</span></span>
            </a>
            <div class="nav-right" style="display:flex;align-items:center;gap:12px;">
                <button id="themeToggle" class="theme-toggle-btn" style="background:none;border:1px solid var(--gray-300);border-radius:8px;padding:8px 12px;cursor:pointer;font-size:1.2rem;">&#127769;</button>
            </div>
        </div>
    </nav>

    <main class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <a href="index.html" class="logo">
                        <span class="logo-icon">&#9881;</span>
                        <span class="logo-text">BlueCollar <span class="highlight">Bookie</span></span>
                    </a>
                    <h1>Welcome Back</h1>
                    <p>Sign in to manage your AI receptionist</p>
                </div>

                <button class="google-btn" id="googleSignIn">
                    <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    Continue with Google
                </button>

                <div class="auth-divider">or</div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required placeholder="you@company.com">
                    </div>
                    <div class="form-group password-field">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required placeholder="Enter your password">
                        <button type="button" class="password-toggle" id="togglePassword">&#128065;</button>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block btn-lg">Sign In</button>
                </form>

                <div class="auth-footer">
                    Don't have an account? <a href="signup.html">Sign up</a>
                </div>
            </div>
        </div>
    </main>

    <script src="js/theme.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('togglePassword').addEventListener('click', () => {
                const pwd = document.getElementById('password');
                pwd.type = pwd.type === 'password' ? 'text' : 'password';
            });

            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = e.target.querySelector('button[type="submit"]');
                btn.disabled = true;
                btn.textContent = 'Signing in...';

                const result = await handleLogin({
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                });

                if (result.token) {
                    setToken(result.token);
                    window.location.href = 'dashboard.html';
                } else {
                    alert(result.error || 'Login failed');
                    btn.disabled = false;
                    btn.textContent = 'Sign In';
                }
            });

            document.getElementById('googleSignIn').addEventListener('click', () => {
                alert('Google Sign-In coming soon. Use email/password for now.');
            });
        });
    </script>
</body>
</html>
